<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

/* NAGDAGDAG NG SMOOTH SCROLL BEHAVIOR DITO */
html {
  scroll-behavior: smooth;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:#0a0a08;color:#f5f0e8;overflow-x:hidden;}
:root{--gold:#c9a84c;--gold-light:#e8c96a;--gold-pale:#f5e6c0;--black:#0a0a08;--white:#f5f0e8;--gray:#6b6760;--surface:#111110;--surface2:#181816;}

nav{display:flex;justify-content:space-between;align-items:center;padding:1.4rem 3rem;position:sticky;top:0;z-index:100;background:rgba(10,10,8,0.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(201,168,76,0.15);}
.nav-logo{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:1.2rem;letter-spacing:0.05em;color:var(--white);}
.nav-logo span{color:var(--gold);}
.nav-links{display:flex;gap:2.2rem;list-style:none;}
.nav-links a{font-size:0.75rem;color:var(--gray);text-decoration:none;letter-spacing:0.1em;text-transform:uppercase;transition:color 0.2s;}
.nav-links a:hover{color:var(--gold);}
.nav-cta{background:transparent;color:var(--gold);font-size:0.75rem;padding:0.55rem 1.4rem;border:1px solid var(--gold);text-decoration:none;letter-spacing:0.1em;text-transform:uppercase;transition:all 0.25s;cursor:pointer;}
.nav-cta:hover{background:var(--gold);color:var(--black);}

.hero{min-height:90vh;display:flex;flex-direction:column;justify-content:center;padding:5rem 3rem 3rem;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;top:0;right:0;width:45%;height:100%;background:radial-gradient(ellipse at top right,rgba(201,168,76,0.07) 0%,transparent 65%);pointer-events:none;}
.hero-label{font-size:0.68rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);margin-bottom:2rem;display:flex;align-items:center;gap:0.8rem;}
.hero-label::before{content:'';width:32px;height:1px;background:var(--gold);display:inline-block;}
.avail-dot{width:6px;height:6px;background:var(--gold);border-radius:50%;animation:pulse 2.5s ease-in-out infinite;display:inline-block;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.25;}}
.hero-heading{font-family:'Cormorant Garamond',serif;font-size:clamp(3.5rem,8vw,7rem);font-weight:700;line-height:0.95;letter-spacing:-0.01em;margin-bottom:3rem;}
.hero-heading .white{color:#f5f0e8;}
.hero-heading .gold-stroke{-webkit-text-stroke:1.5px var(--gold);color:transparent;}
.hero-heading .gold{color:var(--gold);}
.hero-bottom{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:2rem;}
.hero-desc{font-size:0.9rem;color:var(--gray);line-height:1.85;max-width:340px;font-weight:300;}
.hero-desc strong{color:var(--gold-pale);font-weight:400;}
.hero-actions{display:flex;gap:1rem;align-items:center;}
.btn-gold{background:var(--gold);color:var(--black);padding:0.85rem 2rem;font-size:0.78rem;font-weight:500;text-decoration:none;letter-spacing:0.08em;text-transform:uppercase;transition:opacity 0.2s;cursor:pointer;border:none;}
.btn-gold:hover{opacity:0.85;}
.btn-outline{border:1px solid rgba(201,168,76,0.4);color:var(--gold-pale);padding:0.85rem 2rem;font-size:0.78rem;text-decoration:none;letter-spacing:0.08em;text-transform:uppercase;transition:border-color 0.2s;cursor:pointer;background:transparent;}
.btn-outline:hover{border-color:var(--gold);}
.hero-decor{position:absolute;right:3rem;top:50%;transform:translateY(-50%);opacity:0.5;}
.hero-decor svg{animation:rotateSlow 20s linear infinite;}
@keyframes rotateSlow{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.hero-decor-dot{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:10px;height:10px;background:var(--gold);border-radius:50%;}

.divider{overflow:hidden;border-top:1px solid rgba(201,168,76,0.12);border-bottom:1px solid rgba(201,168,76,0.12);padding:0.9rem 0;}
.divider-track{display:inline-flex;animation:marquee 22s linear infinite;white-space:nowrap;}
.div-item{font-size:0.68rem;letter-spacing:0.15em;text-transform:uppercase;color:rgba(107,103,96,0.6);padding:0 2.2rem;}
.div-item.g{color:var(--gold);opacity:0.7;}
@keyframes marquee{from{transform:translateX(0);}to{transform:translateX(-50%);}}

.section{padding:5.5rem 3rem;}
.sec-eyebrow{display:flex;align-items:center;gap:1rem;margin-bottom:0.6rem;}
.sec-eyebrow::after{content:'';flex:1;height:1px;background:rgba(201,168,76,0.15);}
.sec-label{font-size:0.65rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold);}
.sec-heading{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,4vw,3rem);font-weight:600;letter-spacing:-0.01em;margin-bottom:3rem;color:var(--white);}
.sec-heading span{color:var(--gold);font-style:italic;}

.projects-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.1);}
.project-card{background:var(--surface);padding:2.2rem;transition:background 0.3s;position:relative;overflow:hidden;}
.project-card::before{content:'';position:absolute;bottom:0;left:0;width:0;height:1px;background:var(--gold);transition:width 0.4s ease;}
.project-card:hover::before{width:100%;}
.project-card:hover{background:var(--surface2);}
.project-card.featured{grid-column:span 2;display:grid;grid-template-columns:1fr 1fr;gap:2.5rem;align-items:center;}
.project-num{font-family:'Cormorant Garamond',serif;font-size:3.5rem;font-weight:400;color:rgba(201,168,76,0.1);line-height:1;margin-bottom:1rem;}
